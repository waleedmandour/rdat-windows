<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RDAT Copilot — Target Editor</title>

  <!-- Monaco Editor from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.55.0/min/vs/loader.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #editor-container { width: 100%; height: 100%; overflow: hidden; background: #1e1e2e; }

    /* Version hint decoration */
    .rdat-version-hint-line {
      background: rgba(45, 212, 191, 0.04);
    }

    /* Phase 2: TM match highlight decoration */
    .tm-match-highlight {
      background: rgba(45, 212, 191, 0.08) !important;
      border-left: 2px solid #2dd4bf !important;
    }
    .tm-match-glyph {
      background: #2dd4bf;
      border-radius: 50%;
      margin-left: 3px;
      width: 4px !important;
      height: 4px !important;
    }

    /* Custom scrollbar */
    .monaco-scrollable-element > .scrollbar > .slider {
      background: rgba(255, 255, 255, 0.1) !important;
      border-radius: 4px !important;
    }
    .monaco-scrollable-element > .scrollbar > .slider:hover {
      background: rgba(255, 255, 255, 0.2) !important;
    }
  </style>
</head>
<body>
  <div id="editor-container"></div>

  <script src="ms-appx:///Assets/Monaco/monaco-bridge.js"></script>

  <script>
    // Load Monaco Editor AMD loader
    require.config({
      paths: { vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.55.0/min/vs" }
    });

    require(["vs/editor/editor.main"], function (monacoInstance) {
      monaco = monacoInstance;

      // Define RDAT custom theme
      monaco.editor.defineTheme("rdat-dark", {
        base: "vs-dark",
        inherit: true,
        rules: [
          { token: "comment", foreground: "555570", fontStyle: "italic" },
          { token: "keyword", foreground: "2dd4bf" },
          { token: "string", foreground: "a5d6a7" },
          { token: "number", foreground: "f59e0b" },
        ],
        colors: {
          "editor.background": "#1e1e2e",
          "editor.foreground": "#e0e0f0",
          "editor.lineHighlightBackground": "#ffffff0a",
          "editorCursor.foreground": "#2dd4bf",
          "editor.selectionBackground": "#2dd4bf30",
          "editorLineNumber.foreground": "#555570",
          "editorLineNumber.activeForeground": "#8888a8",
          "editorIndentGuide.background": "#333346",
          "editorIndentGuide.activeBackground": "#444460",
          "editor.selectionHighlightBackground": "#2dd4bf15",
          "editorBracketMatch.background": "#2dd4bf20",
          "editorBracketMatch.border": "#2dd4bf40",
          "editorWidget.background": "#252536",
          "editorWidget.border": "#333346",
          "editorSuggestWidget.background": "#252536",
          "editorSuggestWidget.border": "#333346",
          "editorSuggestWidget.selectedBackground": "#2dd4bf20",
          "editorInlineSuggest.background": "#2dd4bf10",
          "editorInlineSuggest.foreground": "#8888a8",
        }
      });

      // Register the rdat-target language
      monaco.languages.register({ id: "rdat-target" });

      // Initialize the bridge
      window.initRDATBridge({
        paneId: "target",
        readOnly: false,
        languageId: "rdat-target",
        initialText: ""
      });

      console.log("[RDAT-Target] Monaco editor loaded successfully (Phase 2: RAG ready)");
    });
  </script>
</body>
</html>
