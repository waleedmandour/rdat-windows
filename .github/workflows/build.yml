name: Build RDAT Copilot Desktop

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '9.0.x'
  CONFIGURATION: 'Release'

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution
        run: dotnet restore RDAT.Copilot.sln --verbosity minimal

      - name: Build Core library
        run: dotnet build src/RDAT.Copilot.Core/RDAT.Copilot.Core.csproj --configuration ${{ env.CONFIGURATION }} --no-restore -p:Platform=${{ matrix.platform }} --verbosity minimal

      - name: Build Desktop app
        run: dotnet build src/RDAT.Copilot.Desktop/RDAT.Copilot.Desktop.csproj --configuration ${{ env.CONFIGURATION }} --no-restore -p:Platform=${{ matrix.platform }} -p:WindowsAppSDKSelfContained=true --verbosity minimal

      - name: Run Core tests
        run: dotnet test tests/RDAT.Copilot.Core.Tests/RDAT.Copilot.Core.Tests.csproj --configuration ${{ env.CONFIGURATION }} --no-restore --verbosity normal -p:Platform=${{ matrix.platform }} --no-build

      - name: Publish WinUI 3 App (Self-Contained Unpackaged)
        run: dotnet publish src/RDAT.Copilot.Desktop/RDAT.Copilot.Desktop.csproj -c Release -f net9.0-windows10.0.19041.0 -p:Platform=${{ matrix.platform }} -p:RuntimeIdentifier=win-${{ matrix.platform }} -p:WindowsPackageType=None --self-contained --verbosity minimal

      - name: Upload Desktop build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RDAT-Copilot-Desktop-Windows
          path: src/RDAT.Copilot.Desktop/bin/Release/net9.0-windows10.0.19041.0/win-${{ matrix.platform }}/publish/
          if-no-files-found: warn
