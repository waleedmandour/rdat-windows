name: Build and Release RDAT Copilot

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build Native Windows Executable
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install WinUI 3 Workloads
        run: dotnet workload install maui-windows --ignore-failed-sources

      - name: Ensure Windows 10/11 SDK for CsWinRT
        shell: powershell
        run: |
          $sdkRoot = "${env:ProgramFiles(x86)}\Windows Kits\10\Platforms\UAP"
          if (-not (Test-Path "$sdkRoot\10.0.19041.0\Platform.xml")) {
            Write-Host "Installing Windows 10 SDK 19041 (UAP)..."
            # Use the Visual Studio installer to add just the UAP SDK
            $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
            $vsPath = & $vsWhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
            if ($vsPath) {
              $channel = if ($env:GITHUB_ACTIONS -eq 'true') { 'VisualStudio.17.Release' } else { '17' }
              $installer = Join-Path $vsPath "..\..\VC\Auxiliary\Build\Microsoft.VisualStudio.Installer.exe"
              if (Test-Path $installer) {
                Start-Process -FilePath $installer -ArgumentList 'modify', '--installPath', $vsPath, '--add', 'Microsoft.VisualStudio.Component.Windows10SDK.19041', '--quiet', '--norestart' -Wait -ErrorAction SilentlyContinue
              }
            }
            # Fallback: create minimal Platform.xml stub
            New-Item -ItemType Directory -Path "$sdkRoot\10.0.19041.0" -Force -ErrorAction SilentlyContinue | Out-Null
            if (!(Test-Path "$sdkRoot\10.0.19041.0\Platform.xml")) {
              @'
        <ApplicationPlatform xmlns="http://schemas.microsoft.com/appx/2016/foundation" Name="UAP" Version="10.0.19041.0" />
'@ | Set-Content -Path "$sdkRoot\10.0.19041.0\Platform.xml" -Encoding UTF8
              Write-Host "Created minimal Platform.xml stub"
            }
          }

      - name: Restore NuGet Packages
        run: dotnet restore RDAT.Copilot.sln

      - name: Execute Build Script
        shell: powershell
        run: |
          .\scripts\build-release.ps1
          $zipPath = Get-ChildItem -Path ".\RDAT-Copilot-Portable-*.zip" | Select-Object -First 1
          if ($zipPath) {
            echo "RELEASE_ASSET=$($zipPath.Name)" >> $env:GITHUB_ENV
          }

      - name: Upload ZIP Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.RELEASE_ASSET }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Integration Document
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: docs/RDAT-Copilot-Integration-Document.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
