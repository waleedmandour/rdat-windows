name: Build and Release RDAT Copilot

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: Release

jobs:
  build-and-release:
    name: Build Native Windows Executable
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install Windows App SDK Workloads
        run: |
          dotnet workload install maui-desktop --ignore-failed-sources
          dotnet workload install windowsdesktop --ignore-failed-sources || true

      - name: Restore NuGet Packages
        run: dotnet restore RDAT.Copilot.sln

      - name: Build Release
        run: |
          dotnet build RDAT.Copilot.sln `
            -c ${{ env.CONFIGURATION }} `
            -p:Platform=x64 `
            --no-restore

      - name: Publish Self-Contained Portable App
        run: |
          dotnet publish src/RDAT.Copilot.App/RDAT.Copilot.App.csproj `
            -c ${{ env.CONFIGURATION }} `
            -r win-x64 `
            --self-contained true `
            -p:WindowsPackageType=None `
            -p:PublishReadyToRun=true `
            -p:PublishSingleFile=false `
            -p:WindowsAppSDKSelfContained=true `
            -p:Platform=x64 `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            --output ./publish

      - name: Copy Assets to Publish
        shell: powershell
        run: |
          $assetsDir = "./publish/Assets"
          if (-not (Test-Path $assetsDir)) {
            New-Item -ItemType Directory -Path $assetsDir -Force | Out-Null
          }
          $dataDir = "./publish/Assets/data"
          if (-not (Test-Path $dataDir)) {
            New-Item -ItemType Directory -Path $dataDir -Force | Out-Null
          }
          Write-Host "Assets directory verified." -ForegroundColor Green

      - name: Compress Distribution
        run: |
          Compress-Archive -Path "publish/*" -DestinationPath "RDAT-Copilot-Portable-win-x64.zip" -Force
          echo "RELEASE_ASSET=RDAT-Copilot-Portable-win-x64.zip" >> $env:GITHUB_ENV

      - name: Upload ZIP Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.RELEASE_ASSET }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Integration Document
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: docs/RDAT-Copilot-Integration-Document.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        if: success()
        run: |
          $zipSize = (Get-Item $env:RELEASE_ASSET).Length / 1MB
          Write-Host "Release build complete!" -ForegroundColor Green
          Write-Host "Package: $env:RELEASE_ASSET"
          Write-Host "Size: $([math]::Round($zipSize, 2)) MB"
