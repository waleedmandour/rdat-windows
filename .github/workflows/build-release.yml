name: Build RDAT Copilot Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/build-release.yml'
      - 'scripts/**'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: Release

jobs:
  build:
    name: Build Portable Windows Executable
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Install Windows App SDK Workloads
      run: |
        # The Windows App SDK workload is pre-installed on windows-latest runners.
        # No additional workloads are needed for WinUI 3 desktop apps.
        Write-Host "Verifying .NET SDK workloads..."
        dotnet workload list

    - name: Restore NuGet packages
      run: dotnet restore RDAT.Copilot.sln

    - name: Build Release
      shell: powershell
      run: |
        # Build with detailed verbosity and capture XamlCompiler output
        dotnet build RDAT.Copilot.sln -c $env:CONFIGURATION -p:Platform=x64 --no-restore -v diag 2>&1 |
          Out-File -FilePath build-log.txt -Encoding utf8
        
        # Always show the build result
        $buildResult = Select-String -Path build-log.txt -Pattern "Build FAILED|Build succeeded|error MSB|error CS|XamlCompiler" | Select-Object -Last 20
        $buildResult | ForEach-Object { Write-Host $_.Line }
        
        # If XamlCompiler failed, try to show its input/output
        if ($buildResult -match "XamlCompiler") {
          Write-Host "`n--- XamlCompiler Diagnostics ---" -ForegroundColor Yellow
          $inputJson = "src\RDAT.Copilot.App\obj\x64\Release\input.json"
          $outputJson = "src\RDAT.Copilot.App\obj\x64\Release\output.json"
          if (Test-Path $inputJson) {
            Write-Host "Input JSON exists: $(Get-Item $inputJson).Length bytes" -ForegroundColor Cyan
            Get-Content $inputJson -TotalCount 30 | Write-Host
          }
          if (Test-Path $outputJson) {
            Write-Host "Output JSON:" -ForegroundColor Cyan
            Get-Content $outputJson | Write-Host
          }
        }
        
        # Check exit code
        if ($LASTEXITCODE -ne 0) {
          Write-Host "Build failed with exit code $LASTEXITCODE" -ForegroundColor Red
          exit $LASTEXITCODE
        }

    - name: Publish Self-Contained Portable App
      run: |
        dotnet publish src/RDAT.Copilot.App/RDAT.Copilot.App.csproj `
          -c ${{ env.CONFIGURATION }} `
          -r win-x64 `
          --self-contained true `
          -p:WindowsPackageType=None `
          -p:PublishReadyToRun=true `
          -p:PublishSingleFile=false `
          -p:WindowsAppSDKSelfContained=true `
          -p:Platform=x64 `
          -p:DebugType=None `
          -p:DebugSymbols=false `
          --output ./publish

    - name: Verify Native DLLs
      shell: powershell
      run: |
        $requiredDlls = @("onnxruntime.dll", "onnxruntime_providers_shared.dll")
        $missing = @()
        foreach ($dll in $requiredDlls) {
          $found = Get-ChildItem -Path "./publish" -Filter $dll -Recurse -File
          if ($found.Count -eq 0) {
            $missing += $dll
            Write-Host "WARNING: $dll not found in publish output" -ForegroundColor Yellow
          } else {
            Write-Host "Verified: $dll" -ForegroundColor Green
          }
        }
        if ($missing.Count -gt 0) {
          Write-Host "Missing DLLs: $($missing -join ', ')" -ForegroundColor Red
        }

    - name: Copy Assets to Publish
      shell: powershell
      run: |
        # Ensure Assets directory with Monaco editor files are in publish output
        $assetsDir = "./publish/Assets"
        if (-not (Test-Path $assetsDir)) {
          Write-Host "Creating Assets directory in publish output..." -ForegroundColor Yellow
          New-Item -ItemType Directory -Path $assetsDir -Force | Out-Null
        }

        # Ensure data directory exists
        $dataDir = "./publish/Assets/data"
        if (-not (Test-Path $dataDir)) {
          New-Item -ItemType Directory -Path $dataDir -Force | Out-Null
        }

        Write-Host "Assets directory verified." -ForegroundColor Green

    - name: Compress Portable Distribution
      run: |
        Compress-Archive -Path "publish/*" -DestinationPath "RDAT-Copilot-Portable-win-x64.zip" -Force

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rdat-copilot-windows-portable
        path: RDAT-Copilot-Portable-win-x64.zip
        retention-days: 30

    - name: Create GitHub Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        files: RDAT-Copilot-Portable-win-x64.zip
        tag_name: v1.1.${{ github.run_number }}
        release_name: RDAT Copilot v1.1.${{ github.run_number }} - Portable
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Summary
      if: success()
      shell: powershell
      run: |
        $zipSize = (Get-Item 'RDAT-Copilot-Portable-win-x64.zip').Length / 1MB
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "BUILD SUCCESSFUL" -ForegroundColor Green
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Package: RDAT-Copilot-Portable-win-x64.zip"
        Write-Host "Size: $([math]::Round($zipSize, 2)) MB"
        Write-Host "========================================" -ForegroundColor Cyan
